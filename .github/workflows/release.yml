name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Existing GitHub release version to publish to npm, without the v prefix
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      release-sha: ${{ steps.release.outputs.sha }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Create or update release
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-npm:
    needs: release-please
    if: >-
      always() &&
      (needs.release-please.outputs.release-created == 'true' || inputs.version != '')
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Resolve release ref
        id: ref
        env:
          AUTOMATIC_SHA: ${{ needs.release-please.outputs.release-sha }}
          MANUAL_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$MANUAL_VERSION" ]; then
            if ! [[ "$MANUAL_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid semantic version: $MANUAL_VERSION" >&2
              exit 1
            fi
            echo "ref=v$MANUAL_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$AUTOMATIC_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout release
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify release
        run: |
          npm run check
          npm test
          npm run build
          npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public
